apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: dev-andrey-learning-machines
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app
          image: harbor.hvslocal/andrey-learning-machines/my-app:latest
          ports:
            - containerPort: 80
